name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck plugins/mstack/shared/bin/*.sh scripts/*.sh

      - name: validate marketplace
        run: scripts/validate.sh

      - name: script tests
        run: scripts/test.sh
